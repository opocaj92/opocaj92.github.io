<!DOCTYPE html>
<html lang="it">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Love Death + Comics</title>
		<link href="https://db.onlinewebfonts.com/c/df2b08c9b9436aac5fa981feed814a05?family=TodaySB-Medium" rel="stylesheet">
		<link href="css/style.css" rel="stylesheet" type="text/css">
		<link href="css/thumbnails.css" rel="stylesheet" type="text/css">
		<link href="css/slideshow.css" rel="stylesheet" type="text/css">
	</head>
	<body>
		<div id="main-container">
			<!-- Site banner -->
			<a href="index.html">
				<div id="title">
					<img src="img/logo.png" alt="Logo" id="logo">
				</div>
			</a>
			<!-- Navigation bar -->
			<div id="navbar">
				<a href="index.html">HOME</a>
				<div class="vertical"></div>
				<a href="laluce.html" id="selected">LA LUCE</a>
				<div class="vertical"></div>
			</div>
			<!-- Title header -->
			<div id="header-container">
				<div class="comic-name">La Luce</div>
				<span id="comic-soundtrack">Colonna sonora consigliata:</span>
				<!-- Spotify link -->
				<a href="https://open.spotify.com/intl-it/track/4Ey0S1ODxyLNN4kvN6nPWk?si=8a5d5fdb1bf3422e" target="_blank" id="spotify">
					<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-spotify" viewBox="0 0 16 16">
						<path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0m3.669 11.538a.5.5 0 0 1-.686.165c-1.879-1.147-4.243-1.407-7.028-.77a.499.499 0 0 1-.222-.973c3.048-.696 5.662-.397 7.77.892a.5.5 0 0 1 .166.686m.979-2.178a.624.624 0 0 1-.858.205c-2.15-1.321-5.428-1.704-7.972-.932a.625.625 0 0 1-.362-1.194c2.905-.881 6.517-.454 8.986 1.063a.624.624 0 0 1 .206.858m.084-2.268C10.154 5.56 5.9 5.419 3.438 6.166a.748.748 0 1 1-.434-1.432c2.825-.857 7.523-.692 10.492 1.07a.747.747 0 1 1-.764 1.288"/>
					</svg>
				</a><br>
				<span id="comic-dates">Pubblicato il: 16/03/2026<br>Ultimo aggiornamento: 16/03/2026</span>
			</div>

			<!-- Two columns layout -->
			<div class="columns" id="comic-columns">
				<!-- Thumbnails container -->
				<div id="thumbnails-container">
					<!-- Small images with number -->
					<a onclick="currentSlide(1)">
						<div class="myThumbs">
							<img src="img/laluce/La-Luce_00.png" alt="Thumb 1">
							<div class="numbering-caption">1 / 5</div>
						</div>
					</a>

					<a onclick="currentSlide(2)">
						<div class="myThumbs">
							<img src="img/laluce/La-Luce_01.png" alt="Thumb 2">
							<div class="numbering-caption">2 / 5</div>
						</div>
					</a>

					<a onclick="currentSlide(3)">
						<div class="myThumbs">
							<img src="img/laluce/La-Luce_02.png" alt="Thumb 3">
							<div class="numbering-caption">3 / 5</div>
						</div>
					</a>

					<a onclick="currentSlide(4)">
						<div class="myThumbs">
							<img src="img/laluce/La-Luce_03.png" alt="Thumb 4">
							<div class="numbering-caption">4 / 5</div>
						</div>
					</a>

					<a onclick="currentSlide(5)">
						<div class="myThumbs">
							<img src="img/laluce/La-Luce_04.png" alt="Thumb 4">
							<div class="numbering-caption">5 / 5</div>
						</div>
					</a>
				</div>

				<!-- Slideshow container -->
				<div id="slideshow-container">
					<!-- Full-width images with number -->
					<div class="mySlides">
						<img src="img/laluce/La-Luce_00.png" alt="La Luce - Copertina">
						<div class="numbering">1 / 5</div>
					</div>

					<div class="mySlides">
						<img src="img/laluce/La-Luce_01.png" alt="La Luce - Pagina 1">
						<div class="numbering">2 / 5</div>
					</div>

					<div class="mySlides">
						<img src="img/laluce/La-Luce_02.png" alt="La Luce - Pagina 2">
						<div class="numbering">3 / 5</div>
					</div>

					<div class="mySlides">
						<img src="img/laluce/La-Luce_03.png" alt="La Luce - Pagina 3">
						<div class="numbering">4 / 5</div>
					</div>

					<div class="mySlides">
						<img src="img/laluce/La-Luce_04.png" alt="La Luce - Pagina 4">
						<div class="numbering">5 / 5</div>
					</div>

					<!-- Next and previous buttons -->
					<a class="prev" onclick="plusSlides(-1)">&#10094;</a>
					<a class="next" onclick="plusSlides(1)">&#10095;</a>

					<!-- The dots/circles -->
					<div id="slider-dots">
						<span class="dot" onclick="currentSlide(1)"></span>
						<span class="dot" onclick="currentSlide(2)"></span>
						<span class="dot" onclick="currentSlide(3)"></span>
						<span class="dot" onclick="currentSlide(4)"></span>
						<span class="dot" onclick="currentSlide(5)"></span>
					</div>
				</div>
			</div>

			<script src="js/slideshow.js" type="text/javascript"></script>
		</div>

		<footer>

		</footer>
	</body>
</html>
